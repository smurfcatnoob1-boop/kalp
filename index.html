<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&lt;3</title>
    <style>
        /* CSS RESET & TEMEL STİLLER */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        /* PREMIUM ARKA PLAN VİDEOSU */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }

        /* OVERLAY (SİTENİN KARARMASI VE ATMOSFERİ) */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
            z-index: 2;
            pointer-events: none;
        }

        /* İÇERİK KATMANI (YAZILAR VİDEONUN ÜSTÜNDE OLACAK) */
        .content-layer {
            position: relative;
            z-index: 3;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* EKRANDA RASTGELE BELİREN SERT GLITCHLİ "SENİ SEVİYORUM" YAZILARI */
        .scattered-glitch {
            position: absolute;
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
            font-family: monospace;
            pointer-events: none;
            text-transform: uppercase;
            text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75),
                         -0.025em -0.05em 0 rgba(0, 255, 0, 0.75),
                         0.025em 0.05em 0 rgba(0, 0, 255, 0.75);
            animation: hardGlitch 400ms infinite;
        }

        @keyframes hardGlitch {
            0%, 100% { transform: translate(0) skew(0deg); opacity: 0.9; }
            10% { transform: translate(-4px, 3px) skew(-15deg); color: #ff0055; text-shadow: 3px 0px 0px #0ff; }
            30% { transform: translate(4px, -3px) skew(20deg); color: #00ffaa; text-shadow: -3px -3px 0px #f0f; }
            50% { transform: translate(-2px, -2px) skew(-5deg); opacity: 0.5; }
            70% { transform: translate(5px, 5px) skew(10deg); color: #0000ff; }
            90% { transform: translate(-5px, -5px) skew(-25deg); color: #ffff00; }
        }

        /* KULLANICI ETKİLEŞİM BUTONU */
        #start-btn {
            position: absolute;
            z-index: 999;
            padding: 15px 30px;
            background: transparent;
            border: 2px solid #fff;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.5s ease;
            font-family: inherit;
        }

        #start-btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 15px #fff;
        }
    </style>
</head>
<body>

    <button id="start-btn">GİRİŞ YAP</button>

    <div class="video-container">
        <video id="bg-video" muted playsinline>
            <source src="video.mp4" type="video/mp4">
        </video>
    </div>

    <div class="overlay"></div>

    <div class="content-layer"></div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const video = document.getElementById('bg-video');
        const contentLayer = document.querySelector('.content-layer');

        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            
            video.muted = false;
            video.play();
            
            // 14.5 SANİYE ZAMANLAYICISI (14500 Milisaniye)
            setTimeout(() => {
                // Arka planda sert ve hızlı şekilde rastgele glitch yazıları türetmeye başla
                setInterval(createScatteredText, 250); // Hızlandırıldı (250ms), daha sert bir efekt için
            }, 14500);
        });

        // Ekrana Rastgele Sert Glitch Yazıları Serpiştiren Fonksiyon
        function createScatteredText() {
            const textElement = document.createElement('div');
            textElement.classList.add('scattered-glitch');
            textElement.innerText = "SENİ SEVİYORUM";
            
            // Rastgele koordinatlar
            const posX = Math.floor(Math.random() * 75) + 5; 
            const posY = Math.floor(Math.random() * 75) + 5;
            
            textElement.style.left = `${posX}%`;
            textElement.style.top = `${posY}%`;
            
            // Sert ve karmaşık görünüm için farklı boyutlar
            const randomSize = (Math.random() * 2.5 + 1.2).toFixed(1);
            textElement.style.fontSize = `${randomSize}rem`;

            contentLayer.appendChild(textElement);

            // Ekranı çok doldurmadan hızlıca eskiyenleri imha et (Sertlik hissi verir)
            setTimeout(() => {
                textElement.remove();
            }, 1200);
        }

        // VİDEO BİTİNCE SİTEDEN ATMA MEKANİZMASI
        video.addEventListener('ended', () => {
            // Önce sekmeyi kapatmayı dener, tarayıcı izin vermezse boş sayfaya yönlendirir
            window.close();
            window.location.href = "about:blank";
        });
    </script>
</body>
</html>
