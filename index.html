<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&lt;3</title>
    <style>
        /* CSS RESET & TEMEL STİLLER */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        /* PREMIUM ARKA PLAN VİDEOSU */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }

        /* OVERLAY (SİTENİN KARARMASI VE ATMOSFERİ) */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
            z-index: 2;
            pointer-events: none;
        }

        /* İÇERİK KATMANI (YAZILAR VİDEONUN ÜSTÜNDE OLACAK) */
        .content-layer {
            position: relative;
            z-index: 3;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* EKRANDA RASTGELE BELİREN DAHA KÜÇÜK VE SAKİN "SENİ SEVİYORUM" YAZILARI */
        .scattered-glitch {
            position: absolute;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
            font-family: monospace;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            /* Agresif renkler yerine zarif bir Dreamcore parlaması */
            text-shadow: 0 0 4px rgba(255, 255, 255, 0.6);
            animation: calmGlitch 1.5s ease-in-out infinite alternate;
        }

        @keyframes calmGlitch {
            0% { transform: scale(0.95); opacity: 0.4; filter: blur(0.5px); }
            50% { transform: scale(1) translate(1px, -1px); opacity: 0.9; filter: blur(0px); }
            100% { transform: scale(1.02) translate(-1px, 1px); opacity: 0.5; filter: blur(1px); }
        }

        /* KULLANICI ETKİLEŞİM BUTONU */
        #start-btn {
            position: absolute;
            z-index: 999;
            padding: 15px 30px;
            background: transparent;
            border: 2px solid #fff;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.5s ease;
            font-family: inherit;
        }

        #start-btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 15px #fff;
        }
    </style>
</head>
<body>

    <button id="start-btn">GİRİŞ YAP</button>

    <div class="video-container">
        <video id="bg-video" muted playsinline>
            <source src="video.mp4" type="video/mp4">
        </video>
    </div>

    <div class="overlay"></div>

    <div class="content-layer"></div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const video = document.getElementById('bg-video');
        const contentLayer = document.querySelector('.content-layer');
        
        let glitchInterval = null;
        let glitchActive = false;
        let executionStopped = false;

        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            
            video.muted = false;
            video.play();
            
            // 14.5 SANİYE ZAMANLAYICISI
            setTimeout(() => {
                // Eğer video sonuna 2.5 saniyeden az kalmadıysa döngüyü başlat
                if (!executionStopped) {
                    glitchActive = true;
                    glitchInterval = setInterval(createScatteredText, 350); // Hız biraz azaltılarak sakinleştirildi
                }
            }, 14500);
        });

        // Ekrana Rastgele Sakin Yazılar Serpiştiren Fonksiyon
        function createScatteredText() {
            if (executionStopped) return;

            const textElement = document.createElement('div');
            textElement.classList.add('scattered-glitch');
            textElement.innerText = "SENİ SEVİYORUM";
            
            // Rastgele koordinatlar (%10 ile %80 arası tutarak kenarlara çok taşmasını önledik)
            const posX = Math.floor(Math.random() * 70) + 10; 
            const posY = Math.floor(Math.random() * 70) + 10;
            
            textElement.style.left = `${posX}%`;
            textElement.style.top = `${posY}%`;
            
            // Boyutlar küçültüldü (0.9rem ile 1.5rem arası narin boyutlar)
            const randomSize = (Math.random() * 0.6 + 0.9).toFixed(1);
            textElement.style.fontSize = `${randomSize}rem`;

            contentLayer.appendChild(textElement);

            // Sakin geçişe uygun olarak ekranda kalma süresi ayarlandı
            setTimeout(() => {
                textElement.remove();
            }, 1500);
        }

        // VİDEO SÜRESİNİ ANLIK TAKİP EDEN MEKANİZMA
        video.addEventListener('timeupdate', () => {
            const timeLeft = video.duration - video.currentTime;

            // Videonun bitmesine 2.5 saniye kala tetiklenir
            if (timeLeft <= 2.5 && !executionStopped) {
                executionStopped = true;
                
                // 1. Yeni yazı basmayı tamamen durdur
                if (glitchInterval) {
                    clearInterval(glitchInterval);
                }
                
                // 2. Ekrandaki tüm "seni seviyorum" yazılarını temizle
                contentLayer.innerHTML = '';
            }
        });

        // VİDEO BİTİNCE SİTEDEN ATMA MEKANİZMASI
        video.addEventListener('ended', () => {
            window.close();
            window.location.href = "about:blank";
        });
    </script>
</body>
</html>
